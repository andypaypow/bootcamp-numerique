upstream bootcamp_app {
    server web:8000;
}

server {
    listen 80;
    server_name bootcamp.filtreexpert.org 158.220.96.181;

    # Sécurité
    client_max_body_size 10M;

    # Fichiers statiques
    location /static/ {
        alias /code/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers média
    location /media/ {
        alias /code/media/;
        expires 7d;
    }

    # Proxy vers Django
    location / {
        proxy_pass http://bootcamp_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Webhook — pas de limite de body pour les payloads Cyberschool
    location /webhook/ {
        proxy_pass http://bootcamp_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 5M;
    }

    # Santé
    location /health/ {
        proxy_pass http://bootcamp_app;
        access_log off;
    }
}